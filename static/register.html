<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 闲鱼管理系统</title>
    <link rel="stylesheet" href="/static/lib/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/static/lib/bootstrap-icons/bootstrap-icons.css">
    <script>(function(){try{var m=localStorage.getItem('theme_mode')||'auto';var r=m==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):m;document.documentElement.setAttribute('data-bs-theme',r==='dark'?'dark':'light');}catch(e){}})();</script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.4rem;
            text-align: center;
        }
        .register-header h2 {
            margin-bottom: 0.3rem;
            font-size: 1.4rem;
        }
        .register-body {
            padding: 1.4rem;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #e9ecef;
            padding: 10px 12px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.15rem rgba(102, 126, 234, 0.2);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            color: #fff;
        }
        .btn-register:hover { color: #fff; opacity: 0.92; }
        .login-link { text-align: center; margin-top: 0.8rem; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #495057; }
        .alert { border-radius: 8px; border: none; font-size: 0.88rem; }
        .trial-tip {
            background: #f1f5ff;
            color: #4250a4;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.82rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>用户注册</h2>
            <p class="mb-0 mt-2 opacity-75">创建您的闲鱼自动回复账号</p>
        </div>

        <div class="register-body">
            <div id="alertContainer"></div>

            <div class="trial-tip">
                <i class="bi bi-gift me-1"></i>
                同一公网 IP 首次注册将获得 <strong>1 天免费体验</strong>，到期后可联系管理员开通周/月/年卡。
            </div>

            <form id="registerForm" autocomplete="off">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-1"></i>用户名
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="3-32 个字符，建议字母/数字/下划线" required minlength="3" maxlength="32" autocomplete="username">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i>设置密码
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="至少 6 个字符" required minlength="6" autocomplete="new-password">
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">
                        <i class="bi bi-lock-fill me-1"></i>确认密码
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-register w-100 mt-2">
                    <i class="bi bi-person-plus me-1"></i>立即注册
                </button>
            </form>

            <div class="login-link">
                <span class="text-muted">已有账号？</span>
                <a href="/login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="/static/lib/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        function showAlert(message, type = 'danger') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}-fill me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (username.length < 3 || username.length > 32) {
                showAlert('用户名长度需为 3-32 位'); return;
            }
            if (password.length < 6) { showAlert('密码长度至少 6 位'); return; }
            if (password !== confirm) { showAlert('两次输入的密码不一致'); return; }

            try {
                const resp = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, confirm_password: confirm }),
                });
                const data = await resp.json();
                if (data.success) {
                    showAlert(data.message || '注册成功', 'success');
                    setTimeout(() => { window.location.href = '/login.html'; }, 1500);
                } else {
                    showAlert(data.message || '注册失败');
                }
            } catch (err) {
                console.error(err);
                showAlert('注册失败，请检查网络连接');
            }
        });
    </script>
</body>
</html>
